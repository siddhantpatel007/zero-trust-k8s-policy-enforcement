# secure-network-pxolicy.yaml
# Implements default-deny + explicit allow rules for the secure namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: test-secure
spec:
  # Applies to all pods in this namespace
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # No ingress/egress rules = deny all traffic
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-good-pod-ingress
  namespace: test-secure
spec:
  podSelector:
    matchLabels:
      app: good-pod
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: good-pod
      ports:
        - protocol: TCP
          port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-good-pod-egress
  namespace: test-secure
spec:
  podSelector:
    matchLabels:
      app: good-pod
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
